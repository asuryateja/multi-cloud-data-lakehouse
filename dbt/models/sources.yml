version: 2

sources:
  # ── AWS Glue Catalog (Delta Lake on S3) via BigQuery Omni or external tables ──
  - name: aws_delta
    description: "Delta Lake tables registered in AWS Glue Catalog, surfaced via external connection"
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "aws_external"
    tags: ["aws", "delta-lake", "source"]
    freshness:
      warn_after: { count: 12, period: hour }
      error_after: { count: 24, period: hour }
    loaded_at_field: "_ingestion_timestamp"

    tables:
      - name: raw_events
        description: "Raw click-stream and application events landed in S3 bronze layer"
        columns:
          - name: event_id
            description: "Unique event identifier (UUID)"
            tests: [unique, not_null]
          - name: event_timestamp
            description: "UTC timestamp when the event occurred"
            tests: [not_null]
          - name: user_id
            description: "Anonymized user identifier"
          - name: event_type
            description: "Event classification (click, purchase, view, etc.)"
            tests:
              - accepted_values:
                  values: ["click", "purchase", "view", "search", "session_start", "session_end"]
          - name: source_system
            description: "Originating application or microservice"
            tests: [not_null]
          - name: _ingestion_timestamp
            description: "When this record was written to the Delta table"
            tests: [not_null]
          - name: _partition_date
            description: "Date partition key"
            tests: [not_null]

      - name: raw_customers
        description: "Customer master records from on-premises CRM via ADF ingestion"
        columns:
          - name: customer_id
            tests: [unique, not_null]
          - name: email_hash
            description: "SHA-256 hash of customer email (PII masked)"
            tests: [not_null]
          - name: created_at
            tests: [not_null]

  # ── Azure Synapse (via BigQuery Connected Sheets or JDBC external) ────────
  - name: azure_synapse
    description: "Azure Synapse Analytics tables sourced via ADF and mirrored to BigQuery"
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "azure_mirror"
    tags: ["azure", "synapse", "source"]
    freshness:
      warn_after: { count: 6, period: hour }
      error_after: { count: 12, period: hour }
    loaded_at_field: "synapse_load_timestamp"

    tables:
      - name: transactions
        description: "Financial transactions ingested from on-premises ERP via ADF"
        columns:
          - name: transaction_id
            tests: [unique, not_null]
          - name: amount_usd
            tests: [not_null]
          - name: transaction_date
            tests: [not_null]
          - name: customer_id
            tests: [not_null]

  # ── GCP BigQuery Native ───────────────────────────────────────────────────
  - name: gcp_streaming
    description: "Real-time events loaded by Dataflow from Pub/Sub into BigQuery"
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "{{ env_var('BQ_DATASET', 'mc_lakehouse_dev') }}"
    tags: ["gcp", "streaming", "source", "realtime"]

    tables:
      - name: events
        description: "Streaming events written by Dataflow Pub/Sub → BigQuery pipeline"
        columns:
          - name: event_id
            tests: [not_null]
          - name: event_timestamp
            tests: [not_null]
          - name: user_id
          - name: event_type
          - name: payload
            description: "JSON payload (schema-on-read)"
